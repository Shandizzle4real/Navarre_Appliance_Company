<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navarre Appliance Company | Coming Fall 2026</title>
    <style>
        :root {
            --emerald: #008080;
            --navy: #1a3a5a;
            --orange: #ff8c00;
            --white: #ffffff;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: var(--navy);
        }

        /* Background image with blur effect */
        .bg-image {
            position: fixed;
            left: 0;
            right: 0;
            z-index: -1;
            display: block;
            background-image: url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=1920&q=80'); /* Representative beach background */
            background-size: cover;
            background-position: center;
            width: 100%;
            height: 100%;
            filter: blur(8px);
            transform: scale(1.1);
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: rgba(255, 255, 255, 0.85);
            max-width: 600px;
            margin: 0 auto;
            text-align: center;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .logo {
            max-width: 250px;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .countdown {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--emerald);
            margin: 20px 0;
            border-top: 2px solid var(--emerald);
            border-bottom: 2px solid var(--emerald);
            padding: 15px 0;
            width: 100%;
        }

        .location {
            font-size: 1.2rem;
            margin-bottom: 30px;
        }

        .signup-form {
            width: 100%;
        }

        input[type="email"] {
            padding: 12px;
            width: 70%;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 1rem;
        }

        button {
            padding: 12px 25px;
            background-color: var(--navy);
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }

        button:hover {
            background-color: var(--emerald);
        }

        footer {
            margin-top: 50px;
            font-size: 0.9rem;
            color: #666;
        }
    </style>
</head>
<body>

    <div class="bg-image"></div>

    <div class="container">
        <img src=”file.png” alt="Navarre Appliance Company Logo" class="logo">

        <h1>Navarre Appliance Company</h1>
        
        <div class="countdown">
            COMING FALL 2026
        </div>

        <p class="location">Servicing:</p>
        <p class="location">Pensacola, Gulf Breeze, Navarre + Surrounding areas</p>

        <div class="signup-form">
            <h3>STAY IN THE LOOP</h3>
            <form action="#" method="post">
                <input type="email" placeholder="Your Email Address" required>
                <button type="submit">NOTIFY ME</button>
            </form>
        </div>

        <footer>
            &copy; 2026 Navarre Appliance Company. All rights reserved.
        </footer>
    </div>

</body>
</html>
